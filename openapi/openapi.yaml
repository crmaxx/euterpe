openapi: 3.1.0
info:
  title: Euterpe API
  version: 0.1.0
  description: Homelab music library API. Canonical contract for euterpe-server and frontend.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /
    description: Default server

paths:
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/openapi.json:
    get:
      operationId: getOpenApiSpec
      tags: [Meta]
      summary: OpenAPI document (JSON)
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 specification
          content:
            application/json:
              schema:
                type: object

  /api/v1/server/info:
    get:
      operationId: getServerInfo
      tags: [Server]
      summary: Server configuration snapshot (no secrets)
      security: []
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfoResponse"

  /api/v1/qobuz/sync/latest:
    get:
      operationId: getQobuzSyncLatest
      tags: [Qobuz]
      summary: Most recent favorites sync run
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Latest sync run or null if none
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzSyncLatestResponse"

  /api/v1/qobuz/test-login:
    post:
      operationId: qobuzTestLogin
      tags: [Qobuz]
      summary: Verify Qobuz session token
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzTestLoginRequest"
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzTestLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/qobuz/sync:
    post:
      operationId: qobuzSync
      tags: [Qobuz]
      summary: Sync favorite albums from Qobuz into local database
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzSyncResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/qobuz/favorites:
    get:
      operationId: listQobuzFavorites
      tags: [Qobuz]
      summary: List synced favorite albums
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [album]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Paginated favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzFavoritesListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: addQobuzFavorites
      tags: [Qobuz]
      summary: Add albums to Qobuz favorites
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzFavoritesMutateRequest"
      responses:
        "204":
          description: Added
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/BadGateway"
    delete:
      operationId: removeQobuzFavorites
      tags: [Qobuz]
      summary: Remove albums from Qobuz favorites
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzFavoritesMutateRequest"
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/v1/downloads:
    post:
      operationId: createDownload
      tags: [Downloads]
      summary: Queue a download job
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadRequest"
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    get:
      operationId: listDownloads
      tags: [Downloads]
      summary: List download jobs
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DownloadJobStatus"
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadJobListResponse"

  /api/v1/downloads/{id}:
    get:
      operationId: getDownload
      tags: [Downloads]
      summary: Get download job by id
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadJob"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelDownload
      tags: [Downloads]
      summary: Cancel a queued or running download job
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Cancelled
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/library/scan:
    post:
      operationId: startLibraryScan
      tags: [Library]
      summary: Start background library filesystem scan
      security:
        - AdminBearer: []
        - {}
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanStartResponse"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/library/scan/latest:
    get:
      operationId: getLibraryScanLatest
      tags: [Library]
      summary: Latest library scan run
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Latest scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanLatestResponse"

  /api/v1/library/scan/{id}:
    get:
      operationId: getLibraryScan
      tags: [Library]
      summary: Library scan run by id
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Scan run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanRunSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/albums:
    get:
      operationId: listLibraryAlbums
      tags: [Library]
      summary: List indexed local albums
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Album list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryAlbumListResponse"

  /api/v1/library/albums/{id}:
    get:
      operationId: getLibraryAlbum
      tags: [Library]
      summary: Album detail with tracks
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Album detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryAlbumDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/albums/{id}/cover:
    get:
      operationId: getLibraryAlbumCover
      tags: [Library]
      summary: Album cover image file from library disk
      description: |
        Serves the file at `albums.cover_path` under the configured library root.
        Returns 404 if the album has no `cover_path` or the file is missing.
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Cover image bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/tracks/{id}:
    get:
      operationId: getLibraryTrack
      tags: [Library]
      summary: Track detail
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Track detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryTrackDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchLibraryTrackTags
      tags: [Library]
      summary: Update audio file tags (writes to disk)
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryTrackTagsPatchRequest"
      responses:
        "200":
          description: Updated track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryTrackDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/events:
    get:
      operationId: subscribeEvents
      tags: [Events]
      summary: Server-sent events stream (job and scan progress)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      description: Optional homelab gate when EUTERPE_ADMIN_PASSWORD is set

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Qobuz credentials not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Upstream Qobuz error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    QobuzTestLoginRequest:
      type: object
      required: [user_id, auth_token]
      additionalProperties: false
      properties:
        user_id:
          type: integer
          format: int64
          minimum: 1
        auth_token:
          type: string
          minLength: 1
        persist:
          type: boolean
          default: false
          description: Save encrypted credentials to settings (requires EUTERPE_MASTER_KEY)

    QobuzTestLoginResponse:
      type: object
      required: [membership, user_auth_token_refreshed]
      additionalProperties: false
      properties:
        membership:
          type: string
        user_auth_token_refreshed:
          type: boolean

    QobuzSyncResponse:
      type: object
      required: [run_id, albums_total, added, removed]
      additionalProperties: false
      properties:
        run_id:
          type: integer
          format: int64
        albums_total:
          type: integer
          minimum: 0
        added:
          type: integer
          minimum: 0
        removed:
          type: integer
          minimum: 0

    ServerInfoResponse:
      type: object
      required:
        - version
        - library_path
        - credentials_configured
        - admin_auth_required
      additionalProperties: false
      properties:
        version:
          type: string
        library_path:
          type: string
        credentials_configured:
          type: boolean
        admin_auth_required:
          type: boolean

    QobuzSyncRunSummary:
      type: object
      required: [id, status, started_at]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [running, success, failed]
        started_at:
          type: string
        finished_at:
          type: ["string", "null"]
        albums_total:
          type: integer
          minimum: 0
        albums_added:
          type: integer
          minimum: 0
        albums_removed:
          type: integer
          minimum: 0
        error_message:
          type: ["string", "null"]

    QobuzSyncLatestResponse:
      type: object
      required: [run]
      additionalProperties: false
      properties:
        run:
          oneOf:
            - $ref: "#/components/schemas/QobuzSyncRunSummary"
            - type: "null"

    QobuzFavoriteItem:
      type: object
      required: [album_api_id, qobuz_id, title, artist_name, in_library]
      additionalProperties: false
      properties:
        album_api_id:
          type: string
          description: Qobuz `album/get` id (short ref or slug). Use as `album_api_id` in POST /downloads.
        qobuz_id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        in_library:
          type: boolean
          default: false
        local_album_id:
          type: ["integer", "null"]
          format: int64

    QobuzFavoritesListResponse:
      type: object
      required: [items, total]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QobuzFavoriteItem"
        total:
          type: integer
          minimum: 0

    QobuzFavoritesMutateRequest:
      type: object
      required: [album_ids]
      additionalProperties: false
      properties:
        album_ids:
          type: array
          items:
            type: integer
            format: int64
            minimum: 1
          minItems: 1

    DownloadJobStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]

    DownloadJobType:
      type: string
      enum: [album, track, artist, playlist]

    CreateDownloadRequest:
      type: object
      required: [job_type, album_api_id, quality]
      additionalProperties: false
      properties:
        job_type:
          $ref: "#/components/schemas/DownloadJobType"
        album_api_id:
          type: string
          description: Qobuz `album/get` id (short ref e.g. zg7pv28g4mldg). From GET /api/v1/qobuz/favorites.
        quality:
          type: integer
          description: Qobuz format_id (5=MP3, 6=FLAC, 7=Hi-Res, 27=Hi-Res+)
          enum: [5, 6, 7, 27]
        qobuz_id:
          type: integer
          format: int64
          minimum: 1
          description: Optional catalog id for dedup and job display.

    CreateDownloadResponse:
      type: object
      required: [job_id]
      additionalProperties: false
      properties:
        job_id:
          type: integer
          format: int64

    DownloadJob:
      type: object
      required:
        - id
        - status
        - job_type
        - qobuz_id
        - quality
        - progress_pct
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/DownloadJobStatus"
        job_type:
          $ref: "#/components/schemas/DownloadJobType"
        qobuz_id:
          type: integer
          format: int64
        quality:
          type: integer
        progress_pct:
          type: number
          minimum: 0
          maximum: 100
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    DownloadJobListResponse:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DownloadJob"

    JobProgressEvent:
      type: object
      required: [id, progress_pct]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        progress_pct:
          type: number
          minimum: 0
          maximum: 100

    LibraryScanStartResponse:
      type: object
      required: [scan_id]
      additionalProperties: false
      properties:
        scan_id:
          type: integer
          format: int64

    LibraryScanRunSummary:
      type: object
      required: [id, status, files_seen, files_indexed, started_at]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [running, success, failed, cancelled]
        files_seen:
          type: integer
          minimum: 0
        files_indexed:
          type: integer
          minimum: 0
        started_at:
          type: string
        finished_at:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]

    LibraryScanLatestResponse:
      type: object
      required: [run]
      additionalProperties: false
      properties:
        run:
          oneOf:
            - $ref: "#/components/schemas/LibraryScanRunSummary"
            - type: "null"

    ScanProgressEvent:
      type: object
      required: [scan_id, files_seen, files_indexed]
      additionalProperties: false
      properties:
        scan_id:
          type: integer
          format: int64
        files_seen:
          type: integer
          minimum: 0
        files_indexed:
          type: integer
          minimum: 0

    LibraryAlbumItem:
      type: object
      required: [id, title, artist_name, track_count]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        year:
          type: ["integer", "null"]
        track_count:
          type: integer
          minimum: 0
        cover_path:
          type: ["string", "null"]

    LibraryAlbumListResponse:
      type: object
      required: [items, total]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LibraryAlbumItem"
        total:
          type: integer
          minimum: 0

    LibraryTrackItem:
      type: object
      required: [id, title, path]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        track_number:
          type: ["integer", "null"]
        year:
          type: ["integer", "null"]
        disc_number:
          type: ["integer", "null"]
        genre:
          type: ["string", "null"]
        path:
          type: string
        duration_sec:
          type: ["integer", "null"]

    LibraryAlbumDetailResponse:
      type: object
      required: [id, title, artist_name, tracks]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        year:
          type: ["integer", "null"]
        cover_path:
          type: ["string", "null"]
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/LibraryTrackItem"

    LibraryTrackDetailResponse:
      type: object
      required: [id, album_id, title, artist_name, album_title, path]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        album_id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        album_title:
          type: string
        track_number:
          type: ["integer", "null"]
        year:
          type: ["integer", "null"]
        disc_number:
          type: ["integer", "null"]
        genre:
          type: ["string", "null"]
        path:
          type: string
        duration_sec:
          type: ["integer", "null"]

    LibraryTrackTagsPatchRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        artist_name:
          type: string
        album_title:
          type: string
        track_number:
          type: integer
          minimum: 1
        year:
          type: integer
        disc_number:
          type: integer
          minimum: 1
        genre:
          type: string

openapi: 3.1.0
info:
  title: Euterpe API
  version: 0.1.0
  description: Homelab music library API. Canonical contract for euterpe-server and frontend.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /
    description: Default server

paths:
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/openapi.json:
    get:
      operationId: getOpenApiSpec
      tags: [Meta]
      summary: OpenAPI document (JSON)
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 specification
          content:
            application/json:
              schema:
                type: object

  /api/v1/server/info:
    get:
      operationId: getServerInfo
      tags: [Server]
      summary: Server configuration snapshot (no secrets)
      security: []
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfoResponse"

  /api/v1/qobuz/sync/latest:
    get:
      operationId: getQobuzSyncLatest
      tags: [Qobuz]
      summary: Most recent favorites sync run
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Latest sync run or null if none
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzSyncLatestResponse"

  /api/v1/qobuz/oauth/start:
    get:
      operationId: qobuzOAuthStart
      tags: [Qobuz]
      summary: Start Qobuz OAuth (browser redirect URL)
      description: |
        Returns the Qobuz sign-in URL and a CSRF `state` stored server-side.
        Credentials are only stored via OAuth callback into `qobuz_accounts` (not env).
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Authorize URL and state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzOAuthStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/qobuz/oauth/callback:
    get:
      operationId: qobuzOAuthCallback
      tags: [Qobuz]
      summary: OAuth callback (Qobuz redirects here)
      description: Exchanges `code` for UAT, upserts `qobuz_accounts`, sets active account, reloads client. Redirects to SPA settings.
      security: []
      parameters:
        - name: code
          in: query
          required: false
          description: Authorization code (Qobuz may send `code_autorisation` instead)
          schema:
            type: string
        - name: code_autorisation
          in: query
          required: false
          description: Authorization code as returned by Qobuz sign-in redirect
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: CSRF state (embedded in redirect_url from oauth/start; optional if only one pending flow)
          schema:
            type: string
      responses:
        "307":
          description: Redirect to settings with success query param
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/qobuz/connection:
    get:
      operationId: getQobuzConnection
      tags: [Qobuz]
      summary: Qobuz connection status (no secrets)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzConnectionStatusResponse"

  /api/v1/qobuz/logout:
    post:
      operationId: qobuzLogout
      tags: [Qobuz]
      summary: Disconnect active Qobuz account
      description: Deletes the active account row, clears `qobuz.active_account_id`, reloads API client.
      security:
        - AdminBearer: []
        - {}
      responses:
        "204":
          description: Disconnected
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/qobuz/accounts:
    get:
      operationId: listQobuzAccounts
      tags: [Qobuz]
      summary: List linked Qobuz accounts (no UAT)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzAccountsListResponse"

  /api/v1/qobuz/test-login:
    post:
      operationId: qobuzTestLogin
      tags: [Qobuz]
      summary: Verify Qobuz session token (debug only; does not persist)
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzTestLoginRequest"
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzTestLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/qobuz/sync:
    post:
      operationId: qobuzSync
      tags: [Qobuz]
      summary: Sync favorite albums from Qobuz into local database
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzSyncResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/qobuz/favorites:
    get:
      operationId: listQobuzFavorites
      tags: [Qobuz]
      summary: List synced favorite albums
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [album]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, artist, in_library]
            default: title
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: cursor
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: in_library
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QobuzFavoritesListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: addQobuzFavorites
      tags: [Qobuz]
      summary: Add albums to Qobuz favorites
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzFavoritesMutateRequest"
      responses:
        "204":
          description: Added
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/BadGateway"
    delete:
      operationId: removeQobuzFavorites
      tags: [Qobuz]
      summary: Remove albums from Qobuz favorites
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QobuzFavoritesMutateRequest"
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/v1/downloads:
    post:
      operationId: createDownload
      tags: [Downloads]
      summary: Queue a download job
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadRequest"
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    get:
      operationId: listDownloads
      tags: [Downloads]
      summary: List download jobs
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DownloadJobStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, created_at, status, queue_position]
            default: queue_position
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadJobListResponse"

  /api/v1/downloads/by-url:
    post:
      operationId: createDownloadByUrl
      tags: [Downloads]
      summary: Queue album download from play.qobuz.com URL or album ref
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadByUrlRequest"
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/downloads/torrent/inspect:
    post:
      operationId: inspectTorrentMagnet
      tags: [Downloads, Torrent]
      summary: Inspect torrent metadata from magnet link (list-only, no download)
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TorrentInspectMagnetRequest"
      responses:
        "200":
          description: Torrent file list and staging inspect_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TorrentInspectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/downloads/torrent/inspect/file:
    post:
      operationId: inspectTorrentFile
      tags: [Downloads, Torrent]
      summary: Inspect torrent metadata from .torrent file (multipart upload)
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Torrent file list and staging inspect_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TorrentInspectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/downloads/torrent/confirm:
    post:
      operationId: confirmTorrentDownload
      tags: [Downloads, Torrent]
      summary: Queue torrent download job from a prior inspect
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TorrentConfirmRequest"
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/settings/torrent:
    get:
      operationId: getTorrentSettings
      tags: [Settings, Torrent]
      summary: Torrent client settings (seed limits, upload cap)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Current torrent settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TorrentSettingsResponse"
    patch:
      operationId: patchTorrentSettings
      tags: [Settings, Torrent]
      summary: Update torrent settings
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TorrentSettingsPatch"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TorrentSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/downloads/purge:
    post:
      operationId: purgeFinishedDownloads
      tags: [Downloads]
      summary: Delete all finished download jobs (completed, failed, cancelled)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Purge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadPurgeResponse"

  /api/v1/downloads/{id}:
    get:
      operationId: getDownload
      tags: [Downloads]
      summary: Get download job by id
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadJob"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelDownload
      tags: [Downloads]
      summary: Cancel a queued/running job, or permanently delete a finished job
      description: |
        Without `purge`: cancel a `queued` or `running` job (sets status to `cancelled`).
        With `purge=1`: permanently remove the row; only allowed for `completed`, `failed`, or `cancelled`.
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: purge
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "true"]
          description: When set, delete the job row instead of cancelling.
      responses:
        "204":
          description: Cancelled or purged
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/downloads/{id}/priority:
    patch:
      operationId: patchDownloadPriority
      tags: [Downloads]
      summary: Move a queued job up or down within its source group
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDownloadPriorityRequest"
      responses:
        "204":
          description: Priority updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/scan:
    post:
      operationId: startLibraryScan
      tags: [Library]
      summary: Start background library filesystem scan
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: root
          in: query
          required: false
          schema:
            type: string
          description: Relative path under library root for subtree scan only (e.g. Artist/Album)
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanStartResponse"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/library/scan/latest:
    get:
      operationId: getLibraryScanLatest
      tags: [Library]
      summary: Latest library scan run
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: Latest scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanLatestResponse"

  /api/v1/library/scan/{id}:
    get:
      operationId: getLibraryScan
      tags: [Library]
      summary: Library scan run by id
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Scan run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryScanRunSummary"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelLibraryScan
      tags: [Library]
      summary: Cancel a running library scan
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Scan cancelled
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/library/albums:
    get:
      operationId: listLibraryAlbums
      tags: [Library]
      summary: List indexed local albums
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, artist, year]
            default: title
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: cursor
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Album list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryAlbumListResponse"

  /api/v1/library/albums/{id}:
    get:
      operationId: getLibraryAlbum
      tags: [Library]
      summary: Album detail with tracks
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Album detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryAlbumDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchLibraryAlbumTags
      tags: [Library]
      summary: Update album-wide tags on all track files
      description: |
        Writes shared metadata (artist, album title, year, genre, total tracks, total discs)
        to every audio file in the album. Per-track title, track number, and disc number are
        not changed.
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryAlbumTagsPatchRequest"
      responses:
        "200":
          description: Updated album detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryAlbumDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/albums/{id}/cover:
    get:
      operationId: getLibraryAlbumCover
      tags: [Library]
      summary: Album cover image file from library disk
      description: |
        Serves the file at `albums.cover_path` under the configured library root.
        Returns 404 if the album has no `cover_path` or the file is missing.
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Cover image bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/bmp:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: putLibraryAlbumCover
      tags: [Library]
      summary: Upload or replace album cover image
      description: |
        Writes `cover.<ext>` under the album directory (from `albums.path`), updates
        `albums.cover_path`, and embeds the image in all audio files of the album.
        Maximum body size 20 MiB. Supported types JPEG, PNG, WebP, BMP.
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
          image/png:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          image/bmp:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Cover saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumCoverUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Cover image exceeds size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/library/tracks/{id}/stream:
    get:
      operationId: getLibraryTrackStream
      tags: [Library]
      summary: Stream library audio file for a track
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: access_token
          in: query
          required: false
          description: Admin password (alternative to Authorization header for media elements)
          schema:
            type: string
      responses:
        "200":
          description: Full audio file (no Range header)
          headers:
            Accept-Ranges:
              schema:
                type: string
              example: bytes
            Content-Length:
              schema:
                type: integer
          content:
            audio/flac:
              schema:
                type: string
                format: binary
            audio/mpeg:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content (Range request)
          headers:
            Content-Range:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            Accept-Ranges:
              schema:
                type: string
        "416":
          description: Range not satisfiable
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/tracks/{id}:
    get:
      operationId: getLibraryTrack
      tags: [Library]
      summary: Track detail
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Track detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryTrackDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchLibraryTrackTags
      tags: [Library]
      summary: Update audio file tags (writes to disk)
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryTrackTagsPatchRequest"
      responses:
        "200":
          description: Updated track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryTrackDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/library/albums/{id}/metadata/lookup:
    post:
      operationId: albumMetadataLookup
      tags: [Library]
      summary: Search external catalog for album metadata candidates
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumMetadataLookupRequest"
      responses:
        "200":
          description: Candidate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumMetadataLookupResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/v1/library/albums/{id}/metadata/apply:
    post:
      operationId: albumMetadataApply
      tags: [Library]
      summary: Apply selected metadata candidate to album files and index
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumMetadataApplyRequest"
      responses:
        "200":
          description: Apply result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumMetadataApplyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/v1/integrations:
    get:
      operationId: listIntegrations
      tags: [Integrations]
      summary: List configured integrations
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [tag_source]
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsListResponse"
    post:
      operationId: createIntegration
      tags: [Integrations]
      summary: Add integration from catalog
      security:
        - AdminBearer: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/integrations/catalog:
    get:
      operationId: integrationsCatalog
      tags: [Integrations]
      summary: Available integration providers
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [tag_source]
      responses:
        "200":
          description: Catalog entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsCatalogResponse"

  /api/v1/integrations/{id}:
    patch:
      operationId: patchIntegration
      tags: [Integrations]
      summary: Update integration
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationPatchRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteIntegration
      tags: [Integrations]
      summary: Remove integration
      security:
        - AdminBearer: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/events:
    get:
      operationId: subscribeEvents
      tags: [Events]
      summary: Server-sent events stream (job and scan progress)
      security:
        - AdminBearer: []
        - {}
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      description: Optional homelab gate when EUTERPE_ADMIN_PASSWORD is set

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Qobuz credentials not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Upstream Qobuz error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    QobuzTestLoginRequest:
      type: object
      required: [user_id, auth_token]
      additionalProperties: false
      properties:
        user_id:
          type: integer
          format: int64
          minimum: 1
        auth_token:
          type: string
          minLength: 1

    QobuzOAuthStartResponse:
      type: object
      required: [authorize_url, state]
      additionalProperties: false
      properties:
        authorize_url:
          type: string
          format: uri
        state:
          type: string
          minLength: 8

    QobuzConnectionStatusResponse:
      type: object
      required: [connected, master_key_configured]
      additionalProperties: false
      properties:
        connected:
          type: boolean
        active_account_id:
          type: integer
          format: int64
        qobuz_user_id:
          type: integer
          format: int64
        display_name:
          type: string
        membership_label:
          type: string
        master_key_configured:
          type: boolean

    QobuzAccountListItem:
      type: object
      required: [id, qobuz_user_id, uat_obtained_at, is_active]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        qobuz_user_id:
          type: integer
          format: int64
        display_name:
          type: string
        membership_label:
          type: string
        uat_obtained_at:
          type: string
        is_active:
          type: boolean

    QobuzAccountsListResponse:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QobuzAccountListItem"

    QobuzTestLoginResponse:
      type: object
      required: [membership, user_auth_token_refreshed]
      additionalProperties: false
      properties:
        membership:
          type: string
        user_auth_token_refreshed:
          type: boolean

    QobuzSyncResponse:
      type: object
      required: [run_id, albums_total, added, removed]
      additionalProperties: false
      properties:
        run_id:
          type: integer
          format: int64
        albums_total:
          type: integer
          minimum: 0
        added:
          type: integer
          minimum: 0
        removed:
          type: integer
          minimum: 0

    ServerInfoResponse:
      type: object
      required:
        - version
        - library_path
        - credentials_configured
        - admin_auth_required
      additionalProperties: false
      properties:
        version:
          type: string
        library_path:
          type: string
        credentials_configured:
          type: boolean
        admin_auth_required:
          type: boolean
        torrent_incoming_dir:
          type: ["string", "null"]
          description: |
            Absolute path for torrent staging/downloads when `EUTERPE_TORRENT_INCOMING_DIR` is set.
            Null when torrent API is disabled.

    QobuzSyncRunSummary:
      type: object
      required: [id, status, started_at]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [running, success, failed]
        started_at:
          type: string
        finished_at:
          type: ["string", "null"]
        albums_total:
          type: integer
          minimum: 0
        albums_added:
          type: integer
          minimum: 0
        albums_removed:
          type: integer
          minimum: 0
        error_message:
          type: ["string", "null"]

    QobuzSyncLatestResponse:
      type: object
      required: [run]
      additionalProperties: false
      properties:
        run:
          oneOf:
            - $ref: "#/components/schemas/QobuzSyncRunSummary"
            - type: "null"

    QobuzFavoriteItem:
      type: object
      required: [album_api_id, qobuz_id, title, artist_name, in_library]
      additionalProperties: false
      properties:
        album_api_id:
          type: string
          description: Qobuz `album/get` id (short ref or slug). Use as `album_api_id` in POST /downloads.
        qobuz_id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        in_library:
          type: boolean
          default: false
        local_album_id:
          type: ["integer", "null"]
          format: int64
        local_cover_path:
          type: ["string", "null"]
          description: Library cover path when in_library (`GET /library/albums/{id}/cover`)
        cover_url:
          type: ["string", "null"]
          description: Qobuz thumbnail URL from last sync (fallback when not in library)

    QobuzFavoritesListResponse:
      type: object
      required: [items, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QobuzFavoriteItem"
        next_cursor:
          type: ["string", "null"]
        has_more:
          type: boolean

    QobuzFavoritesMutateRequest:
      type: object
      required: [album_ids]
      additionalProperties: false
      properties:
        album_ids:
          type: array
          items:
            type: integer
            format: int64
            minimum: 1
          minItems: 1

    CreateDownloadByUrlRequest:
      type: object
      required: [url, quality]
      additionalProperties: false
      properties:
        url:
          type: string
          minLength: 1
          description: play.qobuz.com album URL, www.qobuz.com album link, or bare album/get ref
        quality:
          type: integer
          minimum: 1
          maximum: 255
          description: Qobuz format_id (5=MP3, 6=FLAC 16/44, 7=FLAC 24, 27=Hi-Res)

    DownloadJobStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]

    DownloadJobType:
      type: string
      enum: [album, track, artist, playlist, torrent]

    DownloadSource:
      type: string
      enum: [qobuz, torrent]

    CreateDownloadRequest:
      type: object
      required: [job_type, album_api_id, quality]
      additionalProperties: false
      properties:
        job_type:
          $ref: "#/components/schemas/DownloadJobType"
        album_api_id:
          type: string
          description: Qobuz `album/get` id (short ref e.g. zg7pv28g4mldg). From GET /api/v1/qobuz/favorites.
        quality:
          type: integer
          description: Qobuz format_id (5=MP3, 6=FLAC, 7=Hi-Res, 27=Hi-Res+)
          enum: [5, 6, 7, 27]
        qobuz_id:
          type: integer
          format: int64
          minimum: 1
          description: Optional catalog id for dedup and job display.

    CreateDownloadResponse:
      type: object
      required: [job_id]
      additionalProperties: false
      properties:
        job_id:
          type: integer
          format: int64

    PatchDownloadPriorityRequest:
      type: object
      required: [direction]
      additionalProperties: false
      properties:
        direction:
          type: string
          enum: [up, down]

    TorrentLibrqbitState:
      type: string
      enum: [initializing, live, paused, error]

    TorrentEuterpePhase:
      type: string
      enum: [downloading, importing]

    TorrentJobDetail:
      type: object
      required:
        - librqbit_state
        - progress_bytes
        - total_bytes
        - download_speed_bps
        - upload_speed_bps
        - peers_live
        - peers_connecting
      additionalProperties: false
      properties:
        librqbit_state:
          $ref: "#/components/schemas/TorrentLibrqbitState"
        euterpe_phase:
          oneOf:
            - $ref: "#/components/schemas/TorrentEuterpePhase"
            - type: "null"
        progress_bytes:
          type: integer
          format: int64
          minimum: 0
        total_bytes:
          type: integer
          format: int64
          minimum: 0
        download_speed_bps:
          type: integer
          format: int64
          minimum: 0
        upload_speed_bps:
          type: integer
          format: int64
          minimum: 0
        eta_secs:
          type: ["integer", "null"]
          format: int64
          minimum: 0
        peers_live:
          type: integer
          minimum: 0
        peers_connecting:
          type: integer
          minimum: 0
        error:
          type: ["string", "null"]

    DownloadJob:
      type: object
      required:
        - id
        - status
        - job_type
        - source
        - display_title
        - qobuz_id
        - quality
        - progress_pct
        - download_speed_bps
        - queue_position
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/DownloadJobStatus"
        job_type:
          $ref: "#/components/schemas/DownloadJobType"
        source:
          $ref: "#/components/schemas/DownloadSource"
        display_title:
          type: string
          description: Human-readable job title (album name or torrent name)
        qobuz_id:
          type: integer
          format: int64
          description: Qobuz catalog id for album jobs; 0 for torrent
        quality:
          type: integer
          description: Qobuz format_id for album jobs; 0 for torrent
        progress_pct:
          type: number
          minimum: 0
          maximum: 100
        download_speed_bps:
          type: integer
          format: int64
          minimum: 0
          description: Instantaneous download speed in bytes per second
        queue_position:
          type: integer
          format: int64
          description: Order within the same job_type group (lower = higher priority)
        torrent_detail:
          oneOf:
            - $ref: "#/components/schemas/TorrentJobDetail"
            - type: "null"
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    DownloadJobListResponse:
      type: object
      required: [items, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DownloadJob"
        next_cursor:
          type: ["string", "null"]
        has_more:
          type: boolean

    DownloadPurgeResponse:
      type: object
      required: [deleted]
      additionalProperties: false
      properties:
        deleted:
          type: integer
          format: int64
          minimum: 0

    JobProgressEvent:
      type: object
      required: [id, progress_pct, download_speed_bps]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        progress_pct:
          type: number
          minimum: 0
          maximum: 100
        download_speed_bps:
          type: integer
          format: int64
          minimum: 0
        torrent_detail:
          oneOf:
            - $ref: "#/components/schemas/TorrentJobDetail"
            - type: "null"

    TorrentInspectFile:
      type: object
      required: [index, path, size_bytes, selected]
      additionalProperties: false
      properties:
        index:
          type: integer
          minimum: 0
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
          minimum: 0
        selected:
          type: boolean

    TorrentInspectResponse:
      type: object
      required: [inspect_id, name, total_size_bytes, info_hash_v1, files]
      additionalProperties: false
      properties:
        inspect_id:
          type: string
        name:
          type: string
        total_size_bytes:
          type: integer
          format: int64
          minimum: 0
        info_hash_v1:
          type: string
        info_hash_v2:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        free_space_bytes:
          type: ["integer", "null"]
          format: int64
          minimum: 0
        files:
          type: array
          items:
            $ref: "#/components/schemas/TorrentInspectFile"

    TorrentInspectMagnetRequest:
      type: object
      required: [magnet]
      additionalProperties: false
      properties:
        magnet:
          type: string
          minLength: 1

    TorrentConfirmFile:
      type: object
      required: [index, selected]
      additionalProperties: false
      properties:
        index:
          type: integer
          minimum: 0
        selected:
          type: boolean

    TorrentConfirmRequest:
      type: object
      required: [inspect_id, files, copy_to_library, auto_index_after_import]
      additionalProperties: false
      properties:
        inspect_id:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/TorrentConfirmFile"
        copy_to_library:
          type: boolean
        auto_index_after_import:
          type: boolean

    TorrentSettings:
      type: object
      required: [seed_ratio_limit, seed_time_limit_sec, max_upload_kib_per_sec]
      additionalProperties: false
      properties:
        seed_ratio_limit:
          type: number
          minimum: 0
          description: "0 = download-only (disable upload). Values > 0 are rejected in v1."
        seed_time_limit_sec:
          type: integer
          format: int64
          minimum: 0
          description: "0 = download-only. Values > 0 are rejected in v1."
        max_upload_kib_per_sec:
          type: integer
          format: int64
          minimum: 0

    TorrentSettingsResponse:
      allOf:
        - $ref: "#/components/schemas/TorrentSettings"

    TorrentSettingsPatch:
      type: object
      additionalProperties: false
      properties:
        seed_ratio_limit:
          type: number
          minimum: 0
        seed_time_limit_sec:
          type: integer
          format: int64
          minimum: 0
        max_upload_kib_per_sec:
          type: integer
          format: int64
          minimum: 0

    LibraryScanStartResponse:
      type: object
      required: [scan_id]
      additionalProperties: false
      properties:
        scan_id:
          type: integer
          format: int64

    LibraryScanRunSummary:
      type: object
      required:
        [
          id,
          status,
          files_seen,
          files_processed,
          files_indexed,
          files_total,
          started_at,
        ]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [running, success, failed, cancelled]
        files_seen:
          type: integer
          minimum: 0
        files_processed:
          type: integer
          minimum: 0
        files_indexed:
          type: integer
          minimum: 0
        files_total:
          type: integer
          minimum: 0
        started_at:
          type: string
        finished_at:
          type: ["string", "null"]
        error_message:
          type: ["string", "null"]

    LibraryScanLatestResponse:
      type: object
      required: [run]
      additionalProperties: false
      properties:
        run:
          oneOf:
            - $ref: "#/components/schemas/LibraryScanRunSummary"
            - type: "null"

    ScanProgressEvent:
      type: object
      required:
        [scan_id, files_seen, files_processed, files_indexed, files_total]
      additionalProperties: false
      properties:
        scan_id:
          type: integer
          format: int64
        files_seen:
          type: integer
          minimum: 0
        files_processed:
          type: integer
          minimum: 0
        files_indexed:
          type: integer
          minimum: 0
        files_total:
          type: integer
          minimum: 0

    LibraryAlbumItem:
      type: object
      required: [id, title, artist_name, track_count]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        year:
          type: ["integer", "null"]
        track_count:
          type: integer
          minimum: 0
        cover_path:
          type: ["string", "null"]

    LibraryAlbumListResponse:
      type: object
      required: [items, has_more]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LibraryAlbumItem"
        next_cursor:
          type: ["string", "null"]
        has_more:
          type: boolean

    LibraryTrackItem:
      type: object
      required: [id, title, path]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        track_number:
          type: ["integer", "null"]
        year:
          type: ["integer", "null"]
        disc_number:
          type: ["integer", "null"]
        genre:
          type: ["string", "null"]
        path:
          type: string
        duration_sec:
          type: ["integer", "null"]

    LibraryAlbumDetailResponse:
      type: object
      required: [id, title, artist_name, tracks]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        year:
          type: ["integer", "null"]
        cover_path:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        track_total:
          type: ["integer", "null"]
          minimum: 1
        disc_total:
          type: ["integer", "null"]
          minimum: 1
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/LibraryTrackItem"

    LibraryAlbumTagsPatchRequest:
      type: object
      additionalProperties: false
      properties:
        artist_name:
          type: string
        album_title:
          type: string
        year:
          type: integer
        genre:
          type: string
        track_total:
          type: integer
          minimum: 1
        disc_total:
          type: integer
          minimum: 1

    LibraryTrackDetailResponse:
      type: object
      required: [id, album_id, title, artist_name, album_title, path]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        album_id:
          type: integer
          format: int64
        title:
          type: string
        artist_name:
          type: string
        album_title:
          type: string
        track_number:
          type: ["integer", "null"]
        year:
          type: ["integer", "null"]
        disc_number:
          type: ["integer", "null"]
        genre:
          type: ["string", "null"]
        path:
          type: string
        duration_sec:
          type: ["integer", "null"]

    AlbumCoverUploadResponse:
      type: object
      required: [cover_path, tracks_embedded]
      additionalProperties: false
      properties:
        cover_path:
          type: string

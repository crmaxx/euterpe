<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("euterpe.theme") || "system";
          var dark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.add(dark ? "dark" : "light");
          var locale = localStorage.getItem("euterpe.locale");
          if (locale === "ru") document.documentElement.lang = "ru";
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Euterpe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
